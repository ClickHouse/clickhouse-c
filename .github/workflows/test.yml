name: test

on:
  push:
    branches: [main, wip/**]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Cached .debs key off this workflow file: editing the package list below
      # busts it; upstream lts bumps fall back to the restore-key prefix.
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/.apt-cache
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install build deps + ClickHouse
        run: |
          mkdir -p ~/.apt-cache
          sudo mkdir -p /var/cache/apt/archives
          if compgen -G "$HOME/.apt-cache/*.deb" > /dev/null; then
            sudo cp "$HOME"/.apt-cache/*.deb /var/cache/apt/archives/
          fi

          curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' \
            | sudo gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
          ARCH=$(dpkg --print-architecture)
          echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg arch=${ARCH}] https://packages.clickhouse.com/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/clickhouse.list

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            liblz4-dev libzstd-dev libssl-dev liburing-dev clickhouse-common-static

          # Repopulate cache for next run (debs are world-readable).
          if compgen -G "/var/cache/apt/archives/*.deb" > /dev/null; then
            cp /var/cache/apt/archives/*.deb "$HOME/.apt-cache/"
          fi

      - name: Run tests
        run: ./test.sh

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: clickhouse-server-logs
          path: /tmp/ch-test-srv*/server.*
          if-no-files-found: ignore
